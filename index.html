<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper: #f6f2e9;
  --ink: #16130d;
  --muted: #8a8474;
  --accent: #b5402f;
}

body {
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-family: 'Inter', system-ui, sans-serif;
  font-variant-numeric: tabular-nums;
}

.sheet { text-align: center; width: 100%; max-width: 720px; }

.kicker {
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 44px;
}

.days {
  font-weight: 500;
  font-size: clamp(64px, 18vw, 140px);
  line-height: 1;
  letter-spacing: -0.01em;
}

.days-label {
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 16px;
}

.clock {
  font-weight: 400;
  font-size: clamp(18px, 4.5vw, 26px);
  letter-spacing: 3px;
  color: var(--ink);
  margin-top: 30px;
}
.clock .sec { color: var(--accent); }

hr {
  border: none;
  border-top: 1px solid var(--ink);
  width: 64px;
  margin: 48px auto 0;
}

.units {
  display: flex;
  justify-content: center;
  gap: clamp(28px, 7vw, 56px);
  margin-top: 40px;
}
.unit b {
  display: block;
  font-weight: 500;
  font-size: clamp(20px, 5vw, 28px);
}
.unit span {
  display: block;
  margin-top: 8px;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.start {
  margin-top: 48px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
}
.start b {
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 1px;
}
</style>
<script data-goatcounter="https://pi314159.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<div class="sheet">

  <div class="kicker" id="kicker"></div>

  <div class="days" id="days">0</div>
  <div class="days-label" id="days-label">dienas</div>

  <div class="clock" id="clock">00:00:00</div>

  <hr>

  <div class="units" id="units">
    <div class="unit"><b id="u-weeks">0</b><span id="l-weeks">nedēļas</span></div>
    <div class="unit"><b id="u-months">0</b><span id="l-months">mēneši</span></div>
    <div class="unit"><b id="u-years">0</b><span id="l-years">gadi</span></div>
  </div>

  <div class="start">sākums <b id="start-date"></b></div>

</div>

<script>
/* ------- iestatījumi ------- */
const START = new Date('2026-07-07T00:00:00');
const LABEL = 'Atskaites diena';
/* --------------------------- */

const $ = id => document.getElementById(id);
$('kicker').textContent = LABEL;

function pluralLV(n, one, many) {
  return (n % 10 === 1 && n % 100 !== 11) ? one : many;
}

function pad(n) { return String(n).padStart(2, '0'); }

function fmtDate(d) {
  return pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + '.' + d.getFullYear() + '.';
}

function calendarMonths(from, to) {
  let m = (to.getFullYear() - from.getFullYear()) * 12 + (to.getMonth() - from.getMonth());
  const probe = new Date(from);
  probe.setMonth(from.getMonth() + m);
  if (probe > to) m--;
  return Math.max(0, m);
}

$('start-date').textContent = fmtDate(START);

function update() {
  const now = new Date();
  const diff = Math.max(0, now - START);

  const days = Math.floor(diff / 86400000);
  const h = Math.floor(diff / 3600000) % 24;
  const min = Math.floor(diff / 60000) % 60;
  const s = Math.floor(diff / 1000) % 60;

  $('days').textContent = days;
  $('days-label').textContent = pluralLV(days, 'diena', 'dienas');
  $('clock').innerHTML = pad(h) + ':' + pad(min) + ':<span class="sec">' + pad(s) + '</span>';

  const weeks = Math.floor(days / 7);
  const months = calendarMonths(START, now);
  const years = Math.floor(months / 12);

  $('u-weeks').textContent = weeks;
  $('l-weeks').textContent = pluralLV(weeks, 'nedēļa', 'nedēļas');
  $('u-months').textContent = months;
  $('l-months').textContent = pluralLV(months, 'mēnesis', 'mēneši');
  $('u-years').textContent = years;
  $('l-years').textContent = pluralLV(years, 'gads', 'gadi');
}

update();
setInterval(update, 250);
</script>
</body>
</html>
