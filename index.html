<style>
:root {
  --paper: #f6f2e9;
  --ink: #16130d;
  --mute: #8a8474;
  --rust: #b5402f;
  --hairline: rgba(22, 19, 13, .14);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

::selection { background: var(--rust); color: var(--paper); }

body {
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.sheet {
  text-align: center;
  width: 100%;
  max-width: 720px;
  animation: rise .7s cubic-bezier(.22,.9,.3,1) both;
}
@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}

.kicker {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 5px;
  margin-right: -5px; /* optiskā korekcija burtu atstarpei */
  text-transform: uppercase;
  color: var(--mute);
  margin-bottom: 48px;
}

.odometer {
  font-weight: 500;
  font-size: clamp(30px, 8.5vw, 68px);
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum' 1;
  display: inline-flex;
  align-items: baseline;
  line-height: 1;
}
.reel {
  display: inline-block;
  width: 1ch;
  height: 1em;
  overflow: hidden;
}
.reel .strip {
  display: flex;
  flex-direction: column;
  transition: transform .45s cubic-bezier(.22,.9,.3,1);
}
.reel .strip span { height: 1em; line-height: 1; display: block; }
.gap { display: inline-block; width: .34ch; }
.ms {
  font-size: .34em;
  color: var(--rust);
  margin-left: .6ch;
  min-width: 4ch;
  text-align: left;
  font-weight: 400;
}

hr {
  border: none;
  border-top: 1px solid var(--ink);
  width: 64px;
  margin: 48px auto 22px;
}

.foot {
  font-size: 13px;
  color: var(--mute);
}
.foot b {
  font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum' 1;
}
.foot b .g { display: inline-block; width: .22ch; }

.year {
  width: 160px;
  height: 1px;
  background: var(--hairline);
  margin: 22px auto 0;
  position: relative;
  overflow: hidden;
}
.year i {
  position: absolute;
  inset: 0 auto 0 0;
  width: 0;
  background: var(--rust);
  transition: width 1s linear;
}

.since {
  font-size: 11px;
  color: var(--mute);
  letter-spacing: .4px;
  margin-top: 22px;
  font-variant-numeric: tabular-nums;
}

@media (prefers-reduced-motion: reduce) {
  .reel .strip { transition: none; }
  .sheet { animation: none; }
  .year i { transition: none; }
}
</style>
<script data-goatcounter="https://pi314159.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<main class="sheet">

  <h1 class="kicker">Mans vecums sekundēs</h1>

  <div class="odometer" aria-live="off">
    <span id="digits"></span><span class="ms" id="ms">.000</span>
  </div>

  <hr>

  <p class="foot">līdz nākamajai dzimšanas dienai vēl <b id="bd-left"></b></p>

  <div class="year" role="presentation" title="Gads starp dzimšanas dienām"><i id="year-fill"></i></div>

  <p class="since">skaitīts kopš 1983. gada 31. maija, 12:30</p>

  <noscript><p class="foot" style="margin-top:22px">Skaitītājam nepieciešams JavaScript.</p></noscript>

</main>

<script>
const birth = new Date('1983-05-31T12:30:00');
const $ = id => document.getElementById(id);
const digitsEl = $('digits');
let reelCount = 0;

function buildReels(n) {
  digitsEl.innerHTML = '';
  for (let i = 0; i < n; i++) {
    if (i > 0 && (n - i) % 3 === 0) {
      const g = document.createElement('span');
      g.className = 'gap';
      digitsEl.appendChild(g);
    }
    const reel = document.createElement('span');
    reel.className = 'reel';
    const strip = document.createElement('span');
    strip.className = 'strip';
    for (let d = 0; d <= 9; d++) {
      const s = document.createElement('span');
      s.textContent = d;
      strip.appendChild(s);
    }
    reel.appendChild(strip);
    digitsEl.appendChild(reel);
  }
  reelCount = n;
}

function setDigits(str) {
  if (str.length !== reelCount) buildReels(str.length);
  const strips = digitsEl.querySelectorAll('.strip');
  for (let i = 0; i < str.length; i++) {
    strips[i].style.transform = 'translateY(-' + str[i] + 'em)';
  }
}

function fmt(n) {
  const s = String(n), g = [];
  for (let i = s.length; i > 0; i -= 3) g.unshift(s.slice(Math.max(0, i - 3), i));
  return g.join('<span class="g"></span>');
}

function anniversaries(now) {
  let y = now.getFullYear() - birth.getFullYear();
  let last = new Date(birth); last.setFullYear(birth.getFullYear() + y);
  if (last > now) { y--; last.setFullYear(birth.getFullYear() + y); }
  const next = new Date(last); next.setFullYear(last.getFullYear() + 1);
  return { last: last, next: next };
}

function update() {
  const now = new Date();
  const diff = now - birth;
  if (diff < 0) { setDigits('0'); $('ms').textContent = '.000'; return; }

  setDigits(String(Math.floor(diff / 1000)));
  $('ms').textContent = '.' + String(diff % 1000).padStart(3, '0');

  const a = anniversaries(now);
  const leftSec = Math.ceil((a.next - now) / 1000);
  $('bd-left').innerHTML = leftSec <= 0 ? 'šodien!' : fmt(leftSec);

  const pct = Math.min(100, Math.max(0, (now - a.last) / (a.next - a.last) * 100));
  $('year-fill').style.width = pct.toFixed(4) + '%';
}

buildReels(1);
update();
setInterval(update, 50);
</script>
</body>
</html>
